
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiTools</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
<h1>MultiTools</h1>
<p>Free Online Utility Tools</p>
</header>

<div class="container">

<div class="tool">
<h3>Word Counter</h3>
<textarea id="wc"></textarea>
<button onclick="wordCounter()">Count</button>
<div id="wc_result"></div>
</div>

<div class="tool">
<h3>Reverse Text</h3>
<textarea id="rev"></textarea>
<button onclick="reverseText()">Reverse</button>
<div id="rev_result"></div>
</div>

<div class="tool">
<h3>Uppercase Converter</h3>
<textarea id="up"></textarea>
<button onclick="upperText()">Convert</button>
<div id="up_result"></div>
</div>

<div class="tool">
<h3>Lowercase Converter</h3>
<textarea id="low"></textarea>
<button onclick="lowerText()">Convert</button>
<div id="low_result"></div>
</div>

<div class="tool">
<h3>Base64 Encode</h3>
<textarea id="b64e"></textarea>
<button onclick="b64encode()">Encode</button>
<div id="b64e_result"></div>
</div>

<div class="tool">
<h3>Base64 Decode</h3>
<textarea id="b64d"></textarea>
<button onclick="b64decode()">Decode</button>
<div id="b64d_result"></div>
</div>

<div class="tool">
<h3>URL Encode</h3>
<textarea id="urlenc"></textarea>
<button onclick="urlencode()">Encode</button>
<div id="urlenc_result"></div>
</div>

<div class="tool">
<h3>URL Decode</h3>
<textarea id="urldec"></textarea>
<button onclick="urldecode()">Decode</button>
<div id="urldec_result"></div>
</div>

<div class="tool">
<h3>JSON Formatter</h3>
<textarea id="json"></textarea>
<button onclick="jsonFormat()">Format</button>
<div id="json_result"></div>
</div>

</div>

<footer>
<p>© 2026 MultiTools</p>
</footer>

<script src="js/script.js"></script>

</body>
</html>
